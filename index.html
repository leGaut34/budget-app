<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Weekly Budget" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Weekly Budget</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --muted: #94a3b8;
      --text: #f8fafc;
      --accent: #38bdf8;
      --good: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --input: #1f2937;
      --border: #334155;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(160deg, #020617, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 22px;
    }

    h1 {
      margin: 10px 0 6px;
      font-size: 2rem;
      letter-spacing: -0.04em;
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      font-size: 0.95rem;
    }

    .card {
      background: rgba(17, 24, 39, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
    }

    label {
      display: block;
      font-weight: 650;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.18);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 620px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    .category {
      display: grid;
      grid-template-columns: 1fr 90px;
      gap: 10px;
      align-items: end;
      padding: 12px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.55);
    }

    .category small {
      color: var(--muted);
      display: block;
      margin-top: 5px;
    }

    .percent-wrap {
      position: relative;
    }

    .percent-wrap span {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .percent-wrap input {
      padding-right: 30px;
      text-align: right;
    }

    .summary {
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
    }

    .row:last-child { border-bottom: none; }

    .amount {
      font-weight: 800;
      font-size: 1.05rem;
    }

    .status {
      margin-top: 10px;
      padding: 12px;
      border-radius: 14px;
      font-weight: 700;
      text-align: center;
    }

    .ok { background: rgba(34, 197, 94, 0.16); color: #86efac; }
    .warn { background: rgba(245, 158, 11, 0.16); color: #fcd34d; }
    .bad { background: rgba(239, 68, 68, 0.16); color: #fca5a5; }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      color: #020617;
      background: var(--accent);
    }

    button.secondary {
      background: #e5e7eb;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      margin: 18px 0 8px;
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Weekly Budget</h1>
      <p class="subtitle">Enter your weekly income and split it by percentage.</p>
    </header>

    <section class="card">
      <label for="income">Weekly income</label>
      <input id="income" type="number" min="0" step="0.01" placeholder="Example: 1800" />
    </section>

    <section class="card">
      <div class="grid" id="categories"></div>
      <div id="status" class="status warn">Percentages must total 100%.</div>
      <div class="buttons">
        <button id="saveBtn">Save</button>
        <button id="resetBtn" class="secondary">Reset</button>
      </div>
    </section>

    <section class="card">
      <h2 style="margin-top:0;">This week</h2>
      <div class="summary" id="summary"></div>
    </section>

    <p class="footer">Works offline after first load. Add to Home Screen from Safari on iPhone.</p>
  </main>

  <script>
    const defaultBudget = {
      income: 0,
      categories: [
        { name: 'Bills', percent: 45 },
        { name: 'Emergency Fund', percent: 10 },
        { name: 'Splurge', percent: 10 },
        { name: 'Savings', percent: 35 }
      ]
    };

    let budget = loadBudget();

    const incomeInput = document.getElementById('income');
    const categoriesEl = document.getElementById('categories');
    const summaryEl = document.getElementById('summary');
    const statusEl = document.getElementById('status');

    function loadBudget() {
      const saved = localStorage.getItem('weeklyBudgetPWA');
      return saved ? JSON.parse(saved) : structuredClone(defaultBudget);
    }

    function saveBudget() {
      localStorage.setItem('weeklyBudgetPWA', JSON.stringify(budget));
    }

    function currency(value) {
      return new Intl.NumberFormat('en-AU', {
        style: 'currency',
        currency: 'AUD'
      }).format(value || 0);
    }

    function renderCategories() {
      categoriesEl.innerHTML = '';
      budget.categories.forEach((cat, index) => {
        const div = document.createElement('div');
        div.className = 'category';
        div.innerHTML = `
          <div>
            <label>${cat.name}</label>
            <small id="amount-${index}">$0.00</small>
          </div>
          <div class="percent-wrap">
            <input type="number" min="0" max="100" step="1" value="${cat.percent}" data-index="${index}" />
            <span>%</span>
          </div>
        `;
        categoriesEl.appendChild(div);
      });

      categoriesEl.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', e => {
          const index = Number(e.target.dataset.index);
          budget.categories[index].percent = Number(e.target.value || 0);
          calculate();
        });
      });
    }

    function calculate() {
      budget.income = Number(incomeInput.value || 0);
      const totalPercent = budget.categories.reduce((sum, cat) => sum + Number(cat.percent || 0), 0);
      summaryEl.innerHTML = '';

      budget.categories.forEach((cat, index) => {
        const amount = budget.income * (Number(cat.percent || 0) / 100);
        const small = document.getElementById(`amount-${index}`);
        if (small) small.textContent = currency(amount);

        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<span>${cat.name} <small style="color:var(--muted)">${cat.percent}%</small></span><span class="amount">${currency(amount)}</span>`;
        summaryEl.appendChild(row);
      });

      const remainingPercent = 100 - totalPercent;
      const remainingAmount = budget.income * (remainingPercent / 100);
      const remainingRow = document.createElement('div');
      remainingRow.className = 'row';
      remainingRow.innerHTML = `<span>Remaining</span><span class="amount">${currency(remainingAmount)}</span>`;
      summaryEl.appendChild(remainingRow);

      statusEl.className = 'status';
      if (totalPercent === 100) {
        statusEl.classList.add('ok');
        statusEl.textContent = 'Perfect — your budget equals 100%.';
      } else if (totalPercent < 100) {
        statusEl.classList.add('warn');
        statusEl.textContent = `You still have ${100 - totalPercent}% to allocate.`;
      } else {
        statusEl.classList.add('bad');
        statusEl.textContent = `You are ${totalPercent - 100}% over budget.`;
      }
    }

    document.getElementById('saveBtn').addEventListener('click', () => {
      saveBudget();
      statusEl.textContent = 'Saved on this device.';
      statusEl.className = 'status ok';
      setTimeout(calculate, 1200);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      budget = structuredClone(defaultBudget);
      incomeInput.value = budget.income;
      renderCategories();
      calculate();
      saveBudget();
    });

    incomeInput.addEventListener('input', calculate);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }

    incomeInput.value = budget.income || '';
    renderCategories();
    calculate();
  </script>
</body>
</html>
